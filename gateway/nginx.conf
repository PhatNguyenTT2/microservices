worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ==========================================
    # Rate Limiting Zones (Layer 1 — Gateway)
    # ==========================================
    # Strict: Auth, Chat, Online Orders (abuse-prone, high-cost)
    limit_req_zone $binary_remote_addr zone=strict:10m rate=10r/m;
    # Standard: Normal CRUD operations (admin panel reads/writes)
    limit_req_zone $binary_remote_addr zone=standard:10m rate=60r/m;
    # WebSocket connections
    limit_conn_zone $binary_remote_addr zone=ws_conn:5m;

    # Return 429 instead of default 503
    limit_req_status 429;
    limit_conn_status 429;

    # ==========================================
    # Upstream Services
    # ==========================================

    # 1. Auth & Identity
    upstream auth_service {
        server auth:3001;
    }
    # 2. Catalog
    upstream catalog_service {
        server catalog:3002;
    }
    # 3. Order
    upstream order_service {
        server order:3003;
    }
    # 4. Settings
    upstream settings_service {
        server settings:3004;
    }
    # 5. Supplier
    upstream supplier_service {
        server supplier:3005;
    }
    # 6. Inventory
    upstream inventory_service {
        server inventory:3006;
    }
    # 7. Payment
    upstream payment_service {
        server payment:3007;
    }
    # 8. AI Chatbot
    upstream chatbot_service {
        server chatbot:3008;
    }
    # 9. Statistics & Analytics
    upstream statistics_service {
        server statistics:3009;
    }

    server {
        listen 80;

        # ==========================================
        # API Gateway Routing
        # NOTE: No trailing slashes — nginx prefix matching
        # handles both /api/orders and /api/orders/123
        # ==========================================

        # --- Service 1: Auth & Identity (:3001) ---
        # STRICT: login/register brute-force protection
        location /api/auth {
            limit_req zone=strict burst=5 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/customers {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/employees {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/stores {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/roles {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/permissions {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/pos-auth {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Service 2: Catalog (:3002) ---
        location /api/products {
            proxy_pass http://catalog_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/categories {
            proxy_pass http://catalog_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Service 3: Order (:3003) ---
        # STRICT only for online saga endpoint (POST /api/orders/online)
        location /api/orders/online {
            limit_req zone=strict burst=3 nodelay;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        # STANDARD for normal order CRUD (admin panel)
        location /api/orders {
            limit_req zone=standard burst=20 nodelay;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/order-details {
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Service 4: Settings (:3004) ---
        location /api/settings {
            proxy_pass http://settings_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/customer-discount-settings {
            proxy_pass http://settings_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/config {
            proxy_pass http://settings_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Service 5: Supplier (:3005) ---
        location /api/suppliers {
            proxy_pass http://supplier_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/purchase-orders {
            proxy_pass http://supplier_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Service 6: Inventory (:3006) ---
        location /api/inventory {
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/batches {
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/stock-out {
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/warehouse {
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Service 7: Payment (:3007) ---
        # MEDIUM: financial endpoints
        location /api/payments {
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Service 8: AI Chatbot (:3008) ---
        # STRICT: AI/LLM calls are expensive
        location /api/chat {
            limit_req zone=strict burst=3 nodelay;
            proxy_pass http://chatbot_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Chatbot WebSocket (:3008) ---
        location /ws/chat {
            limit_conn ws_conn 3;
            proxy_pass http://chatbot_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # --- Service 9: Statistics & Analytics (:3009) ---
        location /api/statistics {
            proxy_pass http://statistics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ==========================================
        # Health check endpoints (no rate limiting)
        # ==========================================
        location /health/auth { proxy_pass http://auth_service/health; }
        location /ready/auth { proxy_pass http://auth_service/ready; }

        location /health/catalog { proxy_pass http://catalog_service/health; }
        location /ready/catalog { proxy_pass http://catalog_service/ready; }

        location /health/order { proxy_pass http://order_service/health; }
        location /ready/order { proxy_pass http://order_service/ready; }

        location /health/settings { proxy_pass http://settings_service/health; }
        location /ready/settings { proxy_pass http://settings_service/ready; }

        location /health/supplier { proxy_pass http://supplier_service/health; }
        location /ready/supplier { proxy_pass http://supplier_service/ready; }

        location /health/inventory { proxy_pass http://inventory_service/health; }
        location /ready/inventory { proxy_pass http://inventory_service/ready; }

        location /health/payment { proxy_pass http://payment_service/health; }
        location /ready/payment { proxy_pass http://payment_service/ready; }

        location /health/chatbot { proxy_pass http://chatbot_service/health; }
        location /ready/chatbot { proxy_pass http://chatbot_service/ready; }

        location /health/statistics { proxy_pass http://statistics_service/health; }
        location /ready/statistics { proxy_pass http://statistics_service/ready; }

        # Gateway health
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }
    }
}
